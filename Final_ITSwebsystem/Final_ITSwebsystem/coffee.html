<head>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Poppins:wght@300;400;600;700&family=Montserrat:wght@300;400;500;700&family=Jua&display=swap" rel="stylesheet"/>
<style>

/* ===== Theme Variables ===== */
:root {
  --primary: #2B0C0E;
  --primary-fg: #F8F1E7;
  --bg: #F8F1E7;
  --fg: #2B0C0E;
  --card: #FDF8F8;
  --card-fg: #2B0C0E;
  --secondary: #E2D1C3;
  --muted: #EAE4E0;
  --muted-fg: #6D4348;
  --border: #E8DDD4;
  --destructive: #F14141;
  --destructive-fg: #F8F1E7;
  --radius: 0.625rem;
}

/* ===== Global Reset ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--fg); line-height: 1.6; }
a { text-decoration: none; color: inherit; }
img { max-width: 100%; display: block; }

/* ===== Announcement Bar ===== */
.announce { position: fixed; top: 0; left: 0; width: 100%; background: var(--primary); color: var(--primary-fg); text-align: center; font-size: 11px; font-weight: 700; padding: 4px 0; letter-spacing: 1.5px; text-transform: uppercase; z-index: 1001; }
.announce a { color: var(--primary-fg); text-decoration: underline; }

/* ===== Header ===== */
.header { position: fixed; top: 24px; left: 0; width: 100%; height: 70px; background: var(--card); box-shadow: 0 2px 8px rgba(0,0,0,.08); z-index: 999; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
.header .logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; color: var(--primary); font-style: italic; flex: 1; display: flex; justify-content: flex-start; }
.header nav { display: none; align-items: center; gap: 4px; font-size: 14px; font-weight: 600; }
.header nav a { padding: 8px 16px; border-radius: 12px; color: var(--primary); transition: all .2s; }
.header nav a:hover, .header nav a.active { background: var(--primary); color: var(--primary-fg); }
.header .icons { display: flex; align-items: center; gap: 12px; flex: 1; justify-content: flex-end; }
.header .icons a { color: var(--primary); }
.cart-badge { position: absolute; top: -8px; right: -8px; background: var(--destructive); color: var(--destructive-fg); font-size: 10px; font-weight: 700; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.burger { display: block; background: none; border: none; color: var(--primary); cursor: pointer; font-size: 24px; }
.spacer { height: 94px; }

/* ===== Dropdown & Drawer ===== */
.menu-dd { position: relative; }
.menu-dd .dd-panel { display: none; position: absolute; top: 100%; left: 0; margin-top: 4px; background: var(--card); border-radius: 12px; border: 1px solid var(--border); min-width: 160px; padding: 8px 0; z-index: 50; }
.menu-dd:hover .dd-panel { display: block; }
.menu-dd .dd-panel a { display: block; padding: 8px 20px; color: var(--primary); }
.menu-dd .dd-panel a:hover { background: var(--muted); }
.mobile-drawer { display: none; position: fixed; inset: 0; top: 94px; background: var(--card); z-index: 998; flex-direction: column; padding: 24px; gap: 8px; font-size: 18px; font-weight: 600; overflow-y: auto; }
.mobile-drawer.open { display: flex; }
.mobile-drawer a { padding: 12px 16px; border-radius: 12px; color: var(--primary); }
.mobile-drawer a:hover { background: var(--muted); }

/* ===== Items Page - Product Grid & Cards ===== */
.items-page { max-width: 1152px; margin: 0 auto; padding: 48px 24px; }
.items-page h1 { font-family: 'Jua', sans-serif; font-size: clamp(2.5rem, 6vw, 3rem); font-weight: 700; color: var(--primary); text-align: center; margin-bottom: 40px; }
.items-grid { display: grid; grid-template-columns: 1fr; gap: 24px; }

.item-card { background: var(--card); border-radius: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.06); transition: all .3s; cursor: pointer; }
.item-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,.12); transform: translateY(-4px); }
.item-card .item-img { aspect-ratio: 1; background: var(--muted); overflow: hidden; }
.item-card img { width: 100%; height: 100%; object-fit: cover; transition: transform .3s; }
.item-card:hover img { transform: scale(1.05); }

.item-card .item-info { padding: 16px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.item-card .item-name { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 600; color: var(--primary); line-height: 1.3; }
.item-card .item-price { color: var(--muted-fg); font-weight: 600; margin-top: 4px; }

.add-btn { flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--primary); color: var(--primary-fg); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: opacity .2s; }
.add-btn:hover { opacity: .9; }
.add-btn.added { background: #16a34a; }

/* ===== Items Page - Lightbox & Notifications ===== */
.lightbox-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; padding: 24px; }
.lightbox-overlay.open { display: flex; }
.lightbox { background: var(--card); border-radius: 20px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.3); position: relative; }
.lightbox-close { position: absolute; top: 12px; right: 16px; background: none; border: none; font-size: 28px; cursor: pointer; color: var(--primary); z-index: 10; line-height: 1; }
.lightbox-img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 20px 20px 0 0; }
.lightbox-body { padding: 24px; }
.lightbox-body h2 { font-family: 'Jua', sans-serif; font-size: 1.6rem; color: var(--primary); margin-bottom: 4px; }
.lightbox-price { font-size: 1.2rem; font-weight: 700; color: var(--muted-fg); margin-bottom: 16px; }
.lightbox-desc { font-size: 14px; color: var(--fg); line-height: 1.7; margin-bottom: 16px; }
.lightbox-meta { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.lightbox-meta-item { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; }
.lightbox-meta-label { font-weight: 700; color: var(--primary); min-width: 90px; text-transform: uppercase; letter-spacing: 1px; font-size: 11px; }
.lightbox-meta-value { color: var(--muted-fg); }
.lightbox-add-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--primary); color: var(--primary-fg); font-family: 'Jua', sans-serif; font-size: 1.1rem; cursor: pointer; transition: opacity .2s; }
.lightbox-add-btn:hover { opacity: .9; }

.toast { position: fixed; bottom: 24px; right: 24px; background: var(--primary); color: var(--primary-fg); padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 600; z-index: 9999; opacity: 0; transform: translateY(20px); transition: all .3s; pointer-events: none; }
.toast.show { opacity: 1; transform: translateY(0); }

/* ===== Footer ===== */
.footer { background: var(--primary); color: var(--primary-fg); margin-top: auto; padding: 40px 24px; }
.footer-inner { max-width: 1152px; margin: 0 auto; }
.footer-top { display: flex; flex-direction: column; align-items: center; gap: 24px; }
.footer-logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; font-style: italic; }
.footer-nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; font-size: 14px; font-family: monospace; }
.footer-line { height: 1px; background: rgba(255,255,255,.3); margin: 24px 0; }
.footer-bottom { display: flex; flex-direction: column; align-items: center; gap: 16px; font-size: 12px; font-family: monospace; }
.footer-socials { display: flex; gap: 16px; }
.footer-socials svg { width: 20px; height: 20px; fill: currentColor; }

/* ===== Media Queries ===== */
@media(min-width:640px) {
  .items-grid { grid-template-columns: repeat(2, 1fr); }
}

@media(min-width:768px) {
  .header { height: 80px; padding: 0 48px; }
  .header nav { display: flex; }
  .burger { display: none; }
  .spacer { height: 104px; }
  .footer-top, .footer-bottom { flex-direction: row; justify-content: space-between; }
}

@media(min-width:1024px) {
  .items-grid { grid-template-columns: repeat(3, 1fr); }
}

</style>
</head>

<script>
/* ===== Coffee Items Data with detailed info for lightbox ===== */
var coffeeItems = [
  {
    id: "coffee-1",
    name: "Cafe Latte",
    price: 185,
    image: "images/coffee1.jpg",
    category: "coffee",
    description: "A classic espresso-based drink made with freshly pulled Arabica espresso and velvety steamed milk. Smooth, creamy, and perfectly balanced for any time of day.",
    calories: "120 kcal",
    ingredients: "Arabica espresso, steamed whole milk, thin layer of microfoam"
  },
  {

    name: "Sea Salt Cream Latte",
    price: 226,
    image: "images/coffee2.webp",
    category: "coffee",
    description: "A rich espresso latte topped with our signature whipped sea salt cream. The salty-sweet contrast makes every sip a unique experience.",
    calories: "180 kcal",
    ingredients: "Arabica espresso, steamed milk, heavy cream, sea salt flakes, vanilla syrup"
  },
  {
    id: "coffee-3",
    name: "Matcha Latte",
    price: 215,
    image: "images/coffee3.jpg",
    category: "coffee",
    description: "Premium ceremonial-grade Japanese matcha whisked to perfection and combined with creamy steamed milk. Earthy, vibrant, and naturally energizing.",
    calories: "150 kcal",
    ingredients: "Ceremonial-grade Uji matcha powder, steamed milk, light sweetener"
  },
  {
    id: "coffee-4",
    name: "Cinnamon Dolce",
    price: 226,
    image: "images/coffee4.webp",
    category: "coffee",
    description: "Warm cinnamon-infused espresso sweetened with our house-made dolce syrup and finished with steamed milk and a dusting of cinnamon sugar.",
    calories: "200 kcal",
    ingredients: "Arabica espresso, cinnamon dolce syrup, steamed milk, whipped cream, cinnamon sugar"
  },
  {
    id: "coffee-5",
    name: "ChocoXpresso",
    price: 226,
    image: "images/coffee5.jpg",
    category: "coffee",
    description: "A bold fusion of rich dark chocolate and double-shot espresso. Think mocha but deeper, darker, and more intense for serious chocolate-coffee lovers.",
    calories: "220 kcal",
    ingredients: "Double-shot Arabica espresso, Belgian dark chocolate, steamed milk, cocoa powder"
  },
  {
    id: "coffee-6",
    name: "White Mocha",
    price: 199,
    image: "images/coffee6.webp",
    category: "coffee",
    description: "Silky white chocolate sauce blended with smooth espresso and steamed milk. Sweet, indulgent, and comforting — our customers' favorite pick-me-up.",
    calories: "250 kcal",
    ingredients: "Arabica espresso, white chocolate sauce, steamed milk, whipped cream"
  }
];

/* ===== Cart Helper Functions ===== */
var STORAGE_KEY = 'peaberry_cart';

function getCart() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  } catch(e) {
    return [];
  }
}

function saveCart(c) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(c));
}

function addToCart(item) {
  var cart = getCart();
  var ex = cart.find(function(i) { return i.id === item.id; });
  if (ex) {
    ex.quantity++;
  } else {
    cart.push({ id: item.id, name: item.name, price: item.price, image: item.image, category: item.category, quantity: 1 });
  }
  saveCart(cart);
  updateBadge();
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

function updateBadge() {
  var c = getCart();
  var n = c.reduce(function(s, i) { return s + i.quantity; }, 0);
  var b = document.getElementById('cartBadge');
  if (n > 0) {
    b.style.display = 'flex';
    b.textContent = n;
  } else {
    b.style.display = 'none';
  }
}

/* ===== Lightbox Functions - open/close item detail modal ===== */
var currentLightboxItem = null;

function openLightbox(item) {
  currentLightboxItem = item;
  document.getElementById('lightboxImg').src = item.image;
  document.getElementById('lightboxImg').alt = item.name;
  document.getElementById('lightboxName').textContent = item.name;
  document.getElementById('lightboxPrice').textContent = '₱' + item.price;
  document.getElementById('lightboxDesc').textContent = item.description;
  document.getElementById('lightboxCal').textContent = item.calories;
  document.getElementById('lightboxIng').textContent = item.ingredients;
  document.getElementById('lightboxOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightboxOverlay').classList.remove('open');
  document.body.style.overflow = '';
  currentLightboxItem = null;
}

/* Close lightbox on X button click */
document.getElementById('lightboxClose').addEventListener('click', closeLightbox);

/* Close lightbox when clicking outside the modal */
document.getElementById('lightboxOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});

/* Add to cart from lightbox */
document.getElementById('lightboxAddBtn').addEventListener('click', function() {
  if (currentLightboxItem) {
    addToCart(currentLightboxItem);
    showToast('Added to cart! ' + currentLightboxItem.name);
    closeLightbox();
  }
});

/* ===== Build the Items Grid - creates card elements dynamically ===== */
var grid = document.getElementById('itemsGrid');
coffeeItems.forEach(function(item) {
  var card = document.createElement('div');
  card.className = 'item-card';
  card.innerHTML =
    '<div class="item-img"><img src="' + item.image + '" alt="' + item.name + '" loading="lazy"/></div>' +
    '<div class="item-info"><div><div class="item-name">' + item.name + '</div>' +
    '<div class="item-price">₱' + item.price + '</div></div>' +
    '<button class="add-btn" data-id="' + item.id + '" aria-label="Add ' + item.name + ' to cart">+</button></div>';

  /* Clicking anywhere on the card opens the lightbox */
  card.addEventListener('click', function(e) {
    /* Unless they clicked the add-to-cart button */
    if (e.target.closest('.add-btn')) return;
    openLightbox(item);
  });

  /* Quick add-to-cart button */
  card.querySelector('.add-btn').addEventListener('click', function(e) {
    e.stopPropagation();
    addToCart(item);
    this.textContent = '✓';
    this.classList.add('added');
    showToast('Added to cart! ' + item.name);
    var btn = this;
    setTimeout(function() {
      btn.textContent = '+';
      btn.classList.remove('added');
    }, 1200);
  });

  grid.appendChild(card);
});

/* ===== Mobile Burger Toggle ===== */
var burgerBtn = document.getElementById('burgerBtn');
var drawer = document.getElementById('mobileDrawer');
burgerBtn.addEventListener('click', function() {
  var open = drawer.classList.toggle('open');
  burgerBtn.textContent = open ? '✕' : '☰';
});

updateBadge();

/* ===== Auto-open lightbox if URL hash matches an item ID (e.g. from index map) ===== */
if (window.location.hash) {
  var hashId = window.location.hash.substring(1);
  var matchItem = coffeeItems.find(function(i) { return i.id === hashId; });
  if (matchItem) {
    openLightbox(matchItem);
  }
}
